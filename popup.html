<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>伴侣提醒</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <h1>伴侣提醒</h1>
      <button id="openWindowBtn" class="icon-btn" title="打开独立窗口">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </button>
    </header>

    <main class="popup-main">
      <div id="stageSection" class="stage-section">
        <div id="stageIndicator" class="stage-indicator">
          <span id="stageDot" class="stage-dot"></span>
          <span id="stageLabel">加载中...</span>
        </div>
        <p id="stageText" class="stage-text">正在获取提醒信息...</p>
      </div>

      <div id="remindersSection" class="reminders-section">
        <h2>近期提醒</h2>
        <div id="remindersList" class="reminders-list">
        </div>
      </div>

      <div id="forecastSection" class="forecast-section">
        <h2>未来 3 天</h2>
        <div id="forecastList" class="forecast-list">
        </div>
      </div>

      <div id="actionSection" class="action-section">
        <p class="action-hint">今天的提醒，你打算怎么做？</p>
        <div class="action-buttons">
          <button id="confirmBtn" class="action-btn confirm">
            <span class="btn-icon">✓</span>
            <span class="btn-text">已确认</span>
          </button>
          <button id="laterBtn" class="action-btn later">
            <span class="btn-icon">⏰</span>
            <span class="btn-text">稍后</span>
          </button>
          <button id="skipBtn" class="action-btn skip">
            <span class="btn-icon">✕</span>
            <span class="btn-text">今天不适合</span>
          </button>
        </div>
        <p id="suggestionText" class="suggestion-text"></p>
      </div>
    </main>

    <footer class="popup-footer">
      <button id="settingsBtn" class="footer-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        设置
      </button>
      <span id="dateDisplay" class="date-display"></span>
      <button id="summaryBtn" class="footer-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        本月总结
      </button>
    </footer>
  </div>

  <div id="summaryModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>本月总结</h3>
        <button id="closeSummaryBtn" class="close-btn">✕</button>
      </div>
      <div id="summaryContent" class="modal-body">
      </div>
    </div>
  </div>

  <script src="storage.js"></script>
  <script src="reminder-engine.js"></script>
  <script src="popup.js"></script>
</body>
</html>
