<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>伴侣提醒 - 独立窗口</title>
  <link rel="stylesheet" href="window.css">
</head>
<body>
  <div class="window-container">
    <header class="window-header">
      <div class="header-content">
        <h1>💕 伴侣提醒</h1>
        <p class="header-subtitle">把"知道、记得、会开口"做好</p>
      </div>
      <button id="refreshBtn" class="header-btn" title="刷新">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </header>

    <main class="window-main">
      <section class="hero-section">
        <div class="hero-card">
          <div class="hero-stage">
            <span id="heroDot" class="hero-dot"></span>
            <span id="heroStageLabel">加载中...</span>
          </div>
          <h2 id="heroText">正在获取信息...</h2>
          <p id="heroDetail" class="hero-detail"></p>
        </div>
      </section>

      <section class="today-section">
        <h3 class="section-title">📅 未来 3 天预告</h3>
        <div id="forecastCards" class="forecast-cards">
        </div>
      </section>

      <section class="reminders-section">
        <div class="section-header">
          <h3 class="section-title">📋 所有提醒</h3>
          <span id="reminderCount" class="section-badge">0</span>
        </div>
        <div id="allRemindersList" class="all-reminders-list">
        </div>
      </section>

      <section class="action-section">
        <h3 class="section-title">✋ 今天的行动</h3>
        <p class="action-hint">针对最近的提醒，你打算怎么做？</p>
        <div class="action-buttons">
          <button id="confirmBtn" class="action-btn confirm-btn">
            <span class="action-icon">✓</span>
            <span class="action-label">已确认</span>
            <span class="action-desc">今天会有所表示</span>
          </button>
          <button id="laterBtn" class="action-btn later-btn">
            <span class="action-icon">⏰</span>
            <span class="action-label">稍后再说</span>
            <span class="action-desc">晚点再想</span>
          </button>
          <button id="skipBtn" class="action-btn skip-btn">
            <span class="action-icon">✕</span>
            <span class="action-label">今天不适合</span>
            <span class="action-desc">改天再表示</span>
          </button>
        </div>
        <div id="suggestionBox" class="suggestion-box">
          <p id="suggestionText">💡 选择一个操作，获取小建议</p>
        </div>
      </section>

      <section class="partner-section">
        <h3 class="section-title">💝 她的偏好</h3>
        <div id="partnerPrefsCard" class="partner-prefs-card">
          <div class="prefs-loading">加载中...</div>
        </div>
        <button id="editPrefsBtn" class="link-btn">管理偏好设置</button>
      </section>
    </main>

    <footer class="window-footer">
      <button id="settingsBtn" class="footer-link">
        ⚙️ 设置
      </button>
      <span class="footer-date" id="footerDate"></span>
      <button id="summaryBtn" class="footer-link">
        📊 本月总结
      </button>
    </footer>
  </div>

  <div id="summaryModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>📊 本月总结</h3>
        <button id="closeSummaryBtn" class="close-btn">✕</button>
      </div>
      <div id="summaryContent" class="modal-body">
      </div>
    </div>
  </div>

  <script src="storage.js"></script>
  <script src="reminder-engine.js"></script>
  <script src="window.js"></script>
</body>
</html>
